<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Opties — Keuzehulp</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Ubuntu:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #6BBAB9;
      --teal-dark: #284A43;
      --teal-light: #e8f6f6;
      --purple: #9B9BDA;
      --purple-deep: #6062C5;
      --text: #636466;
      --white: #ffffff;
      --shadow: 0 4px 20px rgba(107,186,185,0.15);
      --shadow-card: 0 2px 12px rgba(40,74,67,0.10);
    }

    body {
      font-family: 'Ubuntu', sans-serif;
      background: linear-gradient(135deg, #e8f6f6 0%, #f0eefa 100%);
      min-height: 100vh;
      color: var(--text);
      padding: 16px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 28px 0 24px;
    }

    .header-badge {
      display: inline-block;
      background: var(--teal);
      color: white;
      font-family: 'Baloo 2', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      color: var(--teal-dark);
      letter-spacing: 0.04em;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text);
      opacity: 0.8;
    }

    /* Category blocks */
    .category {
      background: var(--white);
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: box-shadow 0.2s ease;
    }

    .category:hover {
      box-shadow: 0 4px 24px rgba(107,186,185,0.22);
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .category-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .category-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--teal-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .category-title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--teal-dark);
      letter-spacing: 0.02em;
    }

    .category-subtitle {
      font-size: 0.78rem;
      color: var(--text);
      opacity: 0.65;
      margin-top: 1px;
    }

    .category-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .selected-count {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.78rem;
      color: var(--teal);
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .selected-count.visible {
      opacity: 1;
    }

    .chevron {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--teal-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, background 0.2s;
      flex-shrink: 0;
    }

    .chevron svg {
      width: 12px;
      height: 12px;
      stroke: var(--teal);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s;
    }

    .category.open .chevron {
      transform: rotate(180deg);
      background: var(--teal);
    }

    .category.open .chevron svg {
      stroke: white;
    }

    /* Options list */
    .options-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .category.open .options-list {
      max-height: 2000px;
    }

    .options-inner {
      padding: 0 20px 16px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--teal-light), transparent);
      margin-bottom: 14px;
    }

    /* Option row */
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f3f3f3;
      gap: 12px;
    }

    .option-row:last-child {
      border-bottom: none;
    }

    .option-name {
      font-size: 0.88rem;
      color: var(--teal-dark);
      flex: 1;
      min-width: 0;
    }

    /* Button group */
    .btn-group {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .btn {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 5px 9px;
      border-radius: 8px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
      letter-spacing: 0.01em;
      background: #f5f5f5;
      color: var(--text);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn.niet-nodig.active {
      background: #fdecea;
      border-color: #e57373;
      color: #c0392b;
    }

    .btn.wenselijk.active {
      background: #fff8e1;
      border-color: #f9a825;
      color: #e65100;
    }

    .btn.essentieel.active {
      background: #e8f6f6;
      border-color: var(--teal);
      color: var(--teal-dark);
    }

    /* ── Custom options block ── */
    .custom-block {
      background: var(--white);
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .custom-block-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 0;
    }

    .custom-block-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--teal-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .custom-block-titles .category-title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--teal-dark);
    }

    .custom-block-titles .category-subtitle {
      font-size: 0.78rem;
      color: var(--text);
      opacity: 0.65;
      margin-top: 1px;
    }

    .custom-options-inner {
      padding: 12px 20px 16px;
    }

    .custom-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--teal-light), transparent);
      margin-bottom: 14px;
    }

    /* Each custom row */
    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .custom-input {
      flex: 1;
      font-family: 'Ubuntu', sans-serif;
      font-size: 0.88rem;
      color: var(--teal-dark);
      background: #f7fbfb;
      border: 1.5px solid var(--teal-light);
      border-radius: 10px;
      padding: 7px 12px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      min-width: 0;
    }

    .custom-input::placeholder {
      color: #b0c8c7;
    }

    .custom-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(107,186,185,0.15);
    }

    .custom-btn-group {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .remove-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1.5px solid #f0d0ce;
      background: #fdecea;
      color: #c0392b;
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s;
    }

    .remove-btn:hover {
      background: #e57373;
      color: white;
      border-color: #e57373;
      transform: translateY(-1px);
    }

    .custom-hint {
      font-size: 0.75rem;
      color: var(--text);
      opacity: 0.45;
      margin-top: 10px;
    }

    /* Add button row */
    .add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--teal);
      background: var(--teal-light);
      border: 1.5px dashed var(--teal);
      border-radius: 10px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.02em;
    }

    .add-btn:hover {
      background: var(--teal);
      color: white;
      border-style: solid;
      transform: translateY(-1px);
    }

    .add-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
    }

    /* Summary bar */
    .summary-bar {
      position: sticky;
      bottom: 16px;
      z-index: 10;
      margin-top: 16px;
    }

    .summary-inner {
      background: var(--teal-dark);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(40,74,67,0.35);
    }

    .summary-text {
      flex: 1;
    }

    .summary-label {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.78rem;
      color: var(--teal);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .summary-count {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.1rem;
      color: white;
      font-weight: 700;
    }

    .send-btn {
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .send-btn:hover {
      background: #5aa9a8;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(107,186,185,0.4);
    }

    .send-btn:active {
      transform: translateY(0);
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: var(--teal-dark);
      color: white;
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.85rem;
      padding: 10px 20px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 100;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Mobile tweaks */
    @media (max-width: 480px) {
      body { padding: 10px; }
      .btn { font-size: 0.68rem; padding: 5px 7px; }
      .option-name { font-size: 0.83rem; }
      .category-header { padding: 14px 16px; }
      .options-inner { padding: 0 16px 14px; }
      .custom-options-inner { padding: 12px 16px 14px; }
      .custom-block-header { padding: 14px 16px 0; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-badge">Auto Keuzehulp</div>
    <h1>Welke opties zijn voor jou belangrijk?</h1>
    <p>Klap een categorie open en geef aan wat je wilt.</p>
  </div>

  <!-- Categories will be rendered here -->
  <div id="categories"></div>

  <!-- Custom options block -->
  <div class="custom-block">
    <div class="custom-block-header">
      <div class="custom-block-icon">✏️</div>
      <div class="custom-block-titles">
        <div class="category-title">Eigen wensen</div>
        <div class="category-subtitle">Iets specifieks dat je mist? Trekhaak wordt verderop gevraagd.</div>
      </div>
    </div>
    <div class="custom-options-inner">
      <div class="custom-divider"></div>
      <div id="custom-rows"></div>
      <div class="add-row">
        <button class="add-btn" onclick="addCustomRow()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Optie toevoegen
        </button>
      </div>
    </div>
  </div>

  <div class="summary-bar">
    <div class="summary-inner">
      <div class="summary-text">
        <div class="summary-label">Jouw selectie</div>
        <div class="summary-count" id="summary-count">0 opties ingevuld</div>
      </div>
      <button class="send-btn" onclick="verzenden()">Verstuur →</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const data = [
    {
      id: "tech",
      icon: "📱",
      title: "Technologie & Navigatie",
      subtitle: "Connectiviteit en rijhulp",
      opties: [
        "Apple CarPlay of Android Auto",
        "Navigatiesysteem",
        "Adaptive Cruise Control",
      ]
    },
    {
      id: "parkeren",
      icon: "🅿️",
      title: "Parkeren & Camera",
      subtitle: "Hulp bij manoeuvreren",
      opties: [
        "Parkeersensoren",
        "360-camera",
        "Achteruitrijcamera",
      ]
    },
    {
      id: "comfort",
      icon: "🛋️",
      title: "Comfort & Interieur",
      subtitle: "Beleving binnenin",
      opties: [
        "Upgrade audiosysteem",
        "Panoramadak",
        "Lederen bekleding",
        "Stoelverwarming",
      ]
    },
    {
      id: "exterieur",
      icon: "✨",
      title: "Exterieur & Stijl",
      subtitle: "Hoe de auto eruitziet",
      opties: [
        "Grotere velgen",
        "Getinte ramen",
      ]
    },
  ];

  // State for predefined options
  const state = {};

  // State for custom options: array of { id, text, value }
  let customRows = [];
  let customIdCounter = 0;

  function render() {
    const container = document.getElementById('categories');
    container.innerHTML = '';

    data.forEach(cat => {
      const filled = cat.opties.filter(o => state[o]).length;

      const div = document.createElement('div');
      div.className = 'category';
      div.id = 'cat-' + cat.id;

      div.innerHTML = `
        <div class="category-header" onclick="toggle('${cat.id}')">
          <div class="category-left">
            <div class="category-icon">${cat.icon}</div>
            <div>
              <div class="category-title">${cat.title}</div>
              <div class="category-subtitle">${cat.subtitle}</div>
            </div>
          </div>
          <div class="category-meta">
            <span class="selected-count ${filled > 0 ? 'visible' : ''}">${filled > 0 ? filled + '/' + cat.opties.length : ''}</span>
            <div class="chevron">
              <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>
        <div class="options-list">
          <div class="options-inner">
            <div class="divider"></div>
            ${cat.opties.map(optie => `
              <div class="option-row" id="row-${optie.replace(/\s+/g,'-')}">
                <span class="option-name">${optie}</span>
                <div class="btn-group">
                  <button class="btn niet-nodig ${state[optie] === 'niet-nodig' ? 'active' : ''}" onclick="kies('${optie}', 'niet-nodig')">✕</button>
                  <button class="btn wenselijk ${state[optie] === 'wenselijk' ? 'active' : ''}" onclick="kies('${optie}', 'wenselijk')">Wenselijk</button>
                  <button class="btn essentieel ${state[optie] === 'essentieel' ? 'active' : ''}" onclick="kies('${optie}', 'essentieel')">Essentieel</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      container.appendChild(div);
    });

    updateSummary();
  }

  function toggle(id) {
    const el = document.getElementById('cat-' + id);
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.category.open').forEach(c => c.classList.remove('open'));
    if (!isOpen) el.classList.add('open');
  }

  function kies(optie, waarde) {
    if (state[optie] === waarde) {
      delete state[optie];
    } else {
      state[optie] = waarde;
    }
    render();
    data.forEach(cat => {
      if (cat.opties.includes(optie)) {
        document.getElementById('cat-' + cat.id).classList.add('open');
      }
    });
  }

  // ── Custom rows ──

  function addCustomRow() {
    const id = ++customIdCounter;
    customRows.push({ id, text: '', value: null });
    renderCustomRows();
    // Focus the new input
    setTimeout(() => {
      const input = document.getElementById('custom-input-' + id);
      if (input) input.focus();
    }, 50);
  }

  function removeCustomRow(id) {
    customRows = customRows.filter(r => r.id !== id);
    renderCustomRows();
    updateSummary();
  }

  function updateCustomText(id, text) {
    const row = customRows.find(r => r.id === id);
    if (row) { row.text = text; updateSummary(); }
  }

  function kiesCustom(id, waarde) {
    const row = customRows.find(r => r.id === id);
    if (!row) return;
    row.value = row.value === waarde ? null : waarde;
    renderCustomRows();
    updateSummary();
  }

  function renderCustomRows() {
    const container = document.getElementById('custom-rows');
    container.innerHTML = '';

    customRows.forEach(row => {
      const div = document.createElement('div');
      div.className = 'custom-row';
      div.innerHTML = `
        <input
          class="custom-input"
          id="custom-input-${row.id}"
          type="text"
          placeholder="Bijv. Head-up display, stoelventilatie…"
          value="${row.text.replace(/"/g, '&quot;')}"
          oninput="updateCustomText(${row.id}, this.value)"
        />
        <div class="custom-btn-group">
          <button class="btn wenselijk ${row.value === 'wenselijk' ? 'active' : ''}" onclick="kiesCustom(${row.id}, 'wenselijk')">Wenselijk</button>
          <button class="btn essentieel ${row.value === 'essentieel' ? 'active' : ''}" onclick="kiesCustom(${row.id}, 'essentieel')">Essentieel</button>
        </div>
        <button class="remove-btn" onclick="removeCustomRow(${row.id})" title="Verwijder">✕</button>
      `;
      container.appendChild(div);
    });
  }

  function updateSummary() {
    const predefined = Object.keys(state).length;
    const custom = customRows.filter(r => r.text.trim() && r.value).length;
    const total = predefined + custom;
    const el = document.getElementById('summary-count');
    el.textContent = total === 0
      ? 'Nog niets geselecteerd'
      : total === 1 ? '1 optie ingevuld' : `${total} opties ingevuld`;
  }

  function verzenden() {
    const essentieel = Object.entries(state).filter(([,v]) => v === 'essentieel').map(([k]) => k);
    const wenselijk  = Object.entries(state).filter(([,v]) => v === 'wenselijk').map(([k]) => k);

    // Add custom rows
    customRows.forEach(r => {
      if (r.text.trim() && r.value === 'essentieel') essentieel.push(r.text.trim());
      if (r.text.trim() && r.value === 'wenselijk')  wenselijk.push(r.text.trim());
    });

    const samenvatting = [
      essentieel.length ? `Essentieel: ${essentieel.join(', ')}` : null,
      wenselijk.length  ? `Wenselijk: ${wenselijk.join(', ')}`   : null,
    ].filter(Boolean).join(' | ');

    window.parent.postMessage({
      name: 'opties-verstuurd',
      data: samenvatting
    }, '*');

    showToast('✓ Verstuurd naar je Buddy!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Init: render categories + 1 default custom row
  render();
  addCustomRow();
</script>
</body>
</html>
